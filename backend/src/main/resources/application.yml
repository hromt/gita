server:
  port: 8080

spring:
  application:
    name: gita-server
  datasource:
    url: jdbc:h2:file:./data/gita-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

gita:
  jwt:
    secret: ${GITA_JWT_SECRET:ChangeThisToALongRandomSecretKeyForProductionUseAtLeast256Bits}
    expiration-ms: 604800000

logging:
  level:
    org.springframework.security: INFO
